<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ND Lanches | Cardápio Digital</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --g1: #0b3d18; --g2: #145a28; --g3: #1b7a36;
            --am: #f5c518; --am-dark: #d4a800;
            --bg: #f8fafc; --white: #ffffff;
            --text: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

        /* HEADER PREMIUM */
        header { 
            background: linear-gradient(135deg, var(--g1) 0%, #05220d 100%); 
            color: white; padding: 40px 20px 60px; text-align: center;
            border-radius: 0 0 40px 40px; box-shadow: var(--shadow-md);
        }
        .header-logo-icon { 
            width: 70px; height: 70px; background: var(--am); 
            margin: 0 auto 15px; border-radius: 22px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem; box-shadow: 0 8px 20px rgba(245,197,24,0.4);
        }
        header h1 { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; letter-spacing: 2px; }
        
        /* STATUS PILL */
        #status-loja { 
            display: inline-flex; align-items: center; gap: 8px; 
            padding: 6px 16px; border-radius: 50px; font-weight: 800; 
            font-size: 0.8rem; text-transform: uppercase; margin-top: 10px;
        }
        .aberto { background: #dcfce7; color: #166534; }
        .fechado { background: #fee2e2; color: #991b1b; }

        /* CATEGORIAS (TABS) */
        .tabs-wrapper { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(10px);
            padding: 15px 0; margin-top: -30px;
        }
        .tabs { 
            display: flex; gap: 12px; max-width: 900px; margin: 0 auto; 
            overflow-x: auto; padding: 0 20px; scrollbar-width: none;
        }
        .tab-btn { 
            padding: 12px 24px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--white); cursor: pointer; font-weight: 700;
            white-space: nowrap; transition: 0.3s; color: var(--text-muted);
        }
        .tab-btn.active { background: var(--g1); color: white; border-color: var(--g1); box-shadow: var(--shadow-md); }

        /* GRID DE PRODUTOS */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px 20px 120px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        /* CARD DO PRODUTO */
        .card { 
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            display: flex; flex-direction: row; height: 140px;
            box-shadow: var(--shadow-sm); transition: 0.3s; cursor: pointer;
            border: 1px solid transparent;
        }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--am); }
        
        .card-img { 
            width: 120px; height: 100%; background: #f1f5f9; 
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-content { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-content h3 { font-size: 1.1rem; font-weight: 800; color: var(--g1); }
        .card-content p { font-size: 0.85rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { font-weight: 800; font-size: 1.2rem; color: var(--text); }

        /* CARRINHO FLUTUANTE (PILL) */
        .cart-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 500px; background: var(--g1); 
            padding: 15px 25px; border-radius: 25px; color: white;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 200; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-bar.visible { transform: translateX(-50%) translateY(0); }
        .cart-badge { background: var(--am); color: var(--g1); padding: 4px 12px; border-radius: 10px; font-weight: 900; }

        /* MODAIS MODERNOS */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); z-index: 300; display: flex; 
            align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal { 
            background: var(--white); width: 100%; max-width: 550px; 
            border-radius: 30px 30px 0 0; padding: 30px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0, 1, 0.5, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: translateY(0); }

        /* SELETOR ENTREGA/RETIRADA (Segmented Control) */
        .delivery-selector {
            display: flex; background: #f1f5f9; padding: 5px; border-radius: 15px; margin-bottom: 20px;
        }
        .delivery-option {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: transparent; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .delivery-option.active { background: var(--white); color: var(--g1); box-shadow: var(--shadow-sm); }

        /* FORMULÁRIOS */
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--g2); margin-bottom: 6px; display: block; }
        .custom-input { 
            width: 100%; padding: 14px; border-radius: 15px; border: 1.5px solid var(--border);
            font-family: inherit; font-size: 1rem; font-weight: 600; outline: none; transition: 0.2s;
        }
        .custom-input:focus { border-color: var(--g1); background: #f0fdf4; }

        /* BANNERS */
        #banner-promo.vis { display: block; margin: 10px 20px; }
        .banner-card { border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 2px solid transparent; }

        /* BOTÃO WHATSAPP */
        .btn-whatsapp { 
            width: 100%; padding: 18px; background: #22c55e; color: white; 
            border: none; border-radius: 20px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3); transition: 0.3s;
        }
        .btn-whatsapp:active { transform: scale(0.95); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2rem; }
            .card { height: 120px; }
            .card-img { width: 100px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo-icon">🍔</div>
        <h1>ND LANCHES</h1>
        <div id="status-loja">Verificando...</div>
    </header>

    <div id="banner-promo">
        <div class="banner-wrap">
            <div class="banner-card" id="banner-card">
                <span style="font-size: 2rem;" id="banner-emoji">🔥</span>
                <div>
                    <div style="font-weight: 900;" id="banner-titulo"></div>
                    <div style="font-size: 0.9rem; opacity: 0.8;" id="banner-desc"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="filtrar('TODOS',this)">🏠 Todos</button>
            <button class="tab-btn" onclick="filtrar('LANCHE',this)">🍔 Lanches</button>
            <button class="tab-btn" onclick="filtrar('BEBIDA',this)">🥤 Bebidas</button>
            <button class="tab-btn" onclick="filtrar('PORCAO',this)">🍟 Porções</button>
            <button class="tab-btn" onclick="filtrar('SOBREMESA',this)">🍦 Sobremesas</button>
        </div>
    </div>

    <div class="container">
        <div id="menu-grid" class="grid">
            <!-- Skeletons Automáticos -->
        </div>
    </div>

    <div class="cart-bar" id="cartBar" onclick="abrirModalCarrinho()">
        <div>
            <span class="cart-badge" id="cartCount">0</span>
            <span style="margin-left: 10px; font-weight: 800;">Ver Pedido</span>
        </div>
        <span id="cartTotal" style="font-weight: 900; font-size: 1.2rem;">R$ 0,00</span>
    </div>

    <!-- MODAL CUSTOMIZAR -->
    <div class="modal-overlay" id="customOverlay" onclick="fecharModalFora(event,'customOverlay')">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="cm-header">
                <div class="cm-emoji-box" id="cm-emoji">🍔</div>
                <div>
                    <h3 id="cm-nome" style="font-weight: 900; color: var(--g1);">Produto</h3>
                    <div id="cm-preco-base" style="font-weight: 700; color: var(--text-muted);">R$ 0,00</div>
                </div>
            </div>

            <div id="section-ingredientes" style="margin-bottom: 20px; display: none;">
                <label class="input-label">Retirar ingredientes?</label>
                <div id="chips-ingredientes" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>

            <div style="margin-bottom: 20px;">
                <label class="input-label">Adicionais</label>
                <div id="adicionais-grid"></div>
            </div>

            <div class="input-group">
                <label class="input-label">Alguma observação?</label>
                <textarea id="obs-texto" class="custom-input" rows="2" placeholder="Ex: tirar cebola, ponto da carne..."></textarea>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <span style="font-weight: 800;">Total do Item</span>
                <span id="cm-total" style="font-weight: 900; font-size: 1.5rem; color: var(--g1);">R$ 0,00</span>
            </div>

            <button class="btn-confirmar" onclick="confirmarAdicao()">Adicionar ao Pedido</button>
        </div>
    </div>

    <!-- MODAL CARRINHO -->
    <div class="modal-overlay" id="cartOverlay" onclick="fecharModalFora(event,'cartOverlay')">
        <div class="modal">
            <div class="modal-handle"></div>
            <h2 style="font-family: 'Bebas Neue'; font-size: 2rem; margin-bottom: 20px;">🛒 Finalizar Pedido</h2>

            <div class="input-group">
                <label class="input-label">Seu Nome</label>
                <input type="text" id="nomeCliente" class="custom-input" placeholder="Como te chamamos?">
            </div>

            <label class="input-label">Como deseja receber?</label>
            <div class="delivery-selector">
                <button type="button" id="btnEntrega" class="delivery-option" onclick="setTipoPedido('ENTREGA')">🏍️ Entrega</button>
                <button type="button" id="btnRetirada" class="delivery-option" onclick="setTipoPedido('RETIRADA')">🏠 Retirada</button>
            </div>

            <div id="camposEndereco" style="display: none; gap: 10px; flex-direction: column; margin-bottom: 20px;">
                <input type="text" id="ruaNum" class="custom-input" placeholder="Rua e Número">
                <input type="text" id="bairro" class="custom-input" placeholder="Bairro">
                <input type="text" id="referencia" class="custom-input" placeholder="Ponto de referência">
            </div>

            <div class="input-group">
                <label class="input-label">Forma de Pagamento</label>
                <select id="pagamento" class="custom-input" onchange="checkTroco(this.value)">
                    <option value="PIX">📱 PIX</option>
                    <option value="CARTAO">💳 Cartão (Maquininha)</option>
                    <option value="DINHEIRO">💵 Dinheiro</option>
                </select>
            </div>

            <div id="campoTroco" style="display: none;" class="input-group">
                <label class="input-label">Troco para quanto?</label>
                <input type="number" id="valorTroco" class="custom-input" placeholder="Ex: 50">
            </div>

            <div id="cartItemsList" style="margin: 20px 0; border-top: 1px solid var(--border);"></div>

            <div style="display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 900; margin-bottom: 20px;">
                <span>Total</span>
                <span id="cartTotal2" style="color: var(--g1);">R$ 0,00</span>
            </div>

            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> ENVIAR PEDIDO
            </button>
            <button class="btn-limpar" style="border: none; background: none; color: #ef4444; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer;" onclick="limparCarrinho()">Limpar Carrinho</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = "https://nd-lanches-api.onrender.com/api";
        const LOJA_SLUG = "nd-lanches";
        const LOJA_ID = 1;
        const CART_KEY = `ndlanches_cart_${LOJA_ID}`;
        const WHATSAPP_NUM = "5517996032051";

        let lojaAberta = false, todosProdutos = [], todosAdicionais = [], carrinho = [];
        let prodAtual = null, ingrsAtivos = {}, adicQtd = {}, tipoPedidoSelecionado = 'RETIRADA';

        async function carregarCardapio() {
            restaurarCarrinho();
            try {
                const [rStatus, rProd, rAdic, rBan] = await Promise.all([
                    fetch(`${API_URL}/loja/${LOJA_SLUG}/status`),
                    fetch(`${API_URL}/produtos/loja/${LOJA_ID}`),
                    fetch(`${API_URL}/adicionais/loja/${LOJA_ID}`),
                    fetch(`${API_URL}/banners/loja/${LOJA_ID}/ativos`)
                ]);

                if (rStatus.ok) { lojaAberta = await rStatus.json(); atualizarStatusUI(lojaAberta); }
                if (rProd.ok) { todosProdutos = await rProd.json(); renderizar(todosProdutos); }
                if (rAdic.ok) { todosAdicionais = await rAdic.json(); }
                if (rBan.ok) { const b = await rBan.json(); if(b.length) renderizarBanner(b[0]); }
            } catch (e) { console.error("Erro ao carregar:", e); }
            atualizarCartUI();
            setTipoPedido('RETIRADA');
        }

        function atualizarStatusUI(aberto) {
            const el = document.getElementById('status-loja');
            el.innerHTML = aberto ? '● Aberto Agora' : '○ Fechado';
            el.className = aberto ? 'aberto' : 'fechado';
        }

        function renderizarBanner(b) {
            const el = document.getElementById('banner-promo');
            const card = document.getElementById('banner-card');
            document.getElementById('banner-emoji').textContent = b.emoji || '🔥';
            document.getElementById('banner-titulo').textContent = b.titulo;
            document.getElementById('banner-desc').textContent = b.descricao;
            card.className = `banner-card banner-${b.cor || 'amarelo'}`;
            el.classList.add('vis');
        }

        function renderizar(lista) {
            const g = document.getElementById('menu-grid');
            if(!lista.length) { g.innerHTML = "<p>Nenhum produto encontrado.</p>"; return; }
            g.innerHTML = lista.map(p => `
                <div class="card" onclick="abrirCustom(${p.id})">
                    <div class="card-img">
                        ${p.imagemUrl ? `<img src="${p.imagemUrl}">` : p.emoji || '🍔'}
                    </div>
                    <div class="card-content">
                        <div>
                            <h3>${p.nome}</h3>
                            <p>${p.descricao || ''}</p>
                        </div>
                        <div class="card-price">R$ ${p.preco.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        function abrirCustom(id) {
            if(!lojaAberta) { mostrarToast("Loja fechada no momento!"); return; }
            prodAtual = todosProdutos.find(p => p.id === id);
            ingrsAtivos = {}; adicQtd = {};
            document.getElementById('cm-nome').textContent = prodAtual.nome;
            document.getElementById('cm-preco-base').textContent = `R$ ${prodAtual.preco.toFixed(2)}`;
            
            const ingrs = (prodAtual.descricao || "").split(',').map(s => s.trim()).filter(s => s.length > 2);
            const secIng = document.getElementById('section-ingredientes');
            if(ingrs.length) {
                secIng.style.display = 'block';
                document.getElementById('chips-ingredientes').innerHTML = ingrs.map(i => {
                    ingrsAtivos[i] = true;
                    return `<div class="chip" id="chip-${i}" onclick="toggleIngr('${i}')">${i}</div>`;
                }).join('');
            } else { secIng.style.display = 'none'; }

            document.getElementById('adicionais-grid').innerHTML = todosAdicionais.map(a => `
                <div class="adic-row" id="adic-${a.id}" onclick="toggleAdic(${a.id})">
                    <span>${a.emoji} ${a.nome}</span>
                    <span style="font-weight:800">+ R$ ${a.preco.toFixed(2)}</span>
                </div>
            `).join('');
            
            atualizarTotal();
            document.getElementById('customOverlay').classList.add('open');
        }

        function toggleIngr(i) {
            ingrsAtivos[i] = !ingrsAtivos[i];
            document.getElementById(`chip-${i}`).classList.toggle('removed', !ingrsAtivos[i]);
        }

        function toggleAdic(id) {
            adicQtd[id] = adicQtd[id] ? 0 : 1;
            document.getElementById(`adic-${id}`).classList.toggle('adic-sel', adicQtd[id] > 0);
            atualizarTotal();
        }

        function atualizarTotal() {
            let t = prodAtual.preco;
            Object.entries(adicQtd).forEach(([id, q]) => { if(q) t += todosAdicionais.find(a => a.id == id).preco; });
            document.getElementById('cm-total').textContent = `R$ ${t.toFixed(2)}`;
        }

        function confirmarAdicao() {
            const adics = Object.entries(adicQtd).filter(([id,q]) => q).map(([id]) => ({ adic: todosAdicionais.find(a => a.id == id), qtd: 1 }));
            carrinho.push({
                produto: prodAtual, qtd: 1, 
                precoUnit: parseFloat(document.getElementById('cm-total').textContent.replace('R$ ','')),
                ingredRemovidos: Object.entries(ingrsAtivos).filter(([k,v]) => !v).map(([k]) => k),
                adicSel: adics, obs: document.getElementById('obs-texto').value
            });
            fecharModal('customOverlay'); salvarCarrinho(); atualizarCartUI();
            mostrarToast("Adicionado!");
        }

        function setTipoPedido(tipo) {
            tipoPedidoSelecionado = tipo;
            document.getElementById('btnEntrega').classList.toggle('active', tipo === 'ENTREGA');
            document.getElementById('btnRetirada').classList.toggle('active', tipo === 'RETIRADA');
            document.getElementById('camposEndereco').style.display = tipo === 'ENTREGA' ? 'flex' : 'none';
        }

        function checkTroco(v) { document.getElementById('campoTroco').style.display = v === 'DINHEIRO' ? 'block' : 'none'; }

        async function enviarWhatsApp() {
            const nome = document.getElementById('nomeCliente').value.trim();
            if(!nome) { mostrarToast("⚠️ Digite seu nome!"); return; }
            
            let entregaInfo = "";
            if(tipoPedidoSelecionado === 'ENTREGA') {
                const rua = document.getElementById('ruaNum').value, bairro = document.getElementById('bairro').value;
                if(!rua || !bairro) { mostrarToast("⚠️ Endereço incompleto!"); return; }
                entregaInfo = `📍 *Endereço:* ${rua}, ${bairro}`;
            }

            const pag = document.getElementById('pagamento').value;
            let pagFinal = `💳 *Pagamento:* ${pag}`;
            if(pag === 'DINHEIRO') pagFinal += ` (Troco para R$ ${document.getElementById('valorTroco').value || '0'})`;

            const itens = carrinho.map(i => {
                let s = `• ${i.qtd}x ${i.produto.nome}`;
                if(i.ingredRemovidos.length) s += `\n   - S/ ${i.ingredRemovidos.join(', ')}`;
                i.adicSel.forEach(a => s += `\n   + ${a.adic.nome}`);
                return s;
            }).join('\n\n');

            const msg = `🍔 *NOVO PEDIDO*\n--------------------------\n👤 *Cliente:* ${nome}\n📦 *Tipo:* ${tipoPedidoSelecionado}\n${entregaInfo}\n--------------------------\n${itens}\n--------------------------\n💰 *Total: R$ ${totalCarrinho().toFixed(2)}*\n${pagFinal}`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
            carrinho = []; salvarCarrinho(); atualizarCartUI(); fecharModal('cartOverlay');
        }

        function totalCarrinho() { return carrinho.reduce((s,i) => s + i.precoUnit * i.qtd, 0); }
        function atualizarCartUI() {
            const total = totalCarrinho(), qtd = carrinho.length;
            document.getElementById('cartCount').textContent = qtd;
            document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2)}`;
            document.getElementById('cartTotal2').textContent = `R$ ${total.toFixed(2)}`;
            document.getElementById('cartBar').classList.toggle('visible', qtd > 0);
        }

        function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
        function fecharModalFora(e, id) { if(e.target.id === id) fecharModal(id); }
        function abrirModalCarrinho() { document.getElementById('cartOverlay').classList.add('open'); }
        function mostrarToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
        function salvarCarrinho() { localStorage.setItem(CART_KEY, JSON.stringify({itens:carrinho, ts:Date.now()})); }
        function restaurarCarrinho() { const r = localStorage.getItem(CART_KEY); if(r) carrinho = JSON.parse(r).itens; }
        function limparCarrinho() { if(confirm("Limpar carrinho?")) { carrinho = []; salvarCarrinho(); atualizarCartUI(); fecharModal('cartOverlay'); } }

        function filtrar(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizar(cat === 'TODOS' ? todosProdutos : todosProdutos.filter(p => p.categoria === cat));
        }

        window.onload = carregarCardapio;
    </script>
</body>
</html>
