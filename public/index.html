<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ND Lanches | Cardápio Digital</title>
    <!-- Fonts e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ========== VARIÁVEIS ========== */
        :root {
            --primary: #F59E0B;      /* laranja apetitoso */
            --primary-dark: #D97706;
            --primary-light: #FEF3C7;
            --secondary: #1F2937;    /* cinza escuro elegante */
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --danger: #EF4444;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --radius: 16px;
            --radius-sm: 12px;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* ========== LAYOUT DESKTOP (2 COLUNAS) ========== */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        .two-columns {
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }
        .menu-column {
            flex: 1.8;
            min-width: 0;
        }
        .cart-column {
            flex: 1;
            position: sticky;
            top: 24px;
            align-self: flex-start;
            max-width: 400px;
        }

        /* Responsivo: em telas menores, voltar a ser coluna única */
        @media (max-width: 1024px) {
            .two-columns {
                flex-direction: column;
            }
            .cart-column {
                position: static;
                max-width: 100%;
                top: 0;
            }
        }

        /* ========== HEADER ========== */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, #111827 100%);
            color: white;
            padding: 32px 24px;
            border-radius: 32px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }
        header::after {
            content: '🍔';
            font-size: 140px;
            position: absolute;
            bottom: -20px;
            right: -20px;
            opacity: 0.1;
            pointer-events: none;
        }
        .header-inner {
            position: relative;
            z-index: 2;
        }
        .header-logo-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 4px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 16px;
        }
        .status-pill.open { background: rgba(16,185,129,0.2); color: #A7F3D0; }
        .status-pill.closed { background: rgba(239,68,68,0.2); color: #FECACA; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ========== CATEGORIAS (TABS) ========== */
        .tabs-wrapper {
            margin-bottom: 24px;
            overflow-x: auto;
            scrollbar-width: thin;
            white-space: nowrap;
            padding-bottom: 8px;
        }
        .tabs {
            display: flex;
            gap: 12px;
        }
        .tab-btn {
            background: white;
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        /* ========== PRODUTOS ========== */
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        /* Card de produto */
        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        .product-img {
            position: relative;
            height: 160px;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .product-card:hover .product-img img { transform: scale(1.05); }
        .product-img .emoji-placeholder {
            font-size: 3.5rem;
        }
        .product-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 60px;
            text-transform: uppercase;
        }
        .product-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .product-title {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .product-price {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary-dark);
        }
        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .add-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
        .add-btn:active { transform: scale(0.95); }

        /* ========== CARRINHO LATERAL ========== */
        .cart-panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .cart-header {
            background: var(--secondary);
            color: white;
            padding: 16px 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-items {
            max-height: 500px;
            overflow-y: auto;
            padding: 16px;
        }
        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .cart-item-details {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .cart-item-price {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary-dark);
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-qty-btn {
            background: var(--border);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }
        .cart-total {
            padding: 16px;
            border-top: 2px solid var(--border);
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            background: var(--primary-light);
        }
        .checkout-btn {
            background: #25D366;
            color: white;
            border: none;
            width: calc(100% - 32px);
            margin: 0 16px 20px;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .checkout-btn:hover { filter: brightness(1.05); transform: translateY(-2px); }
        .repeat-order-btn {
            background: var(--primary-light);
            color: var(--primary-dark);
            border: 1px solid var(--primary);
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            padding: 10px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: white;
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1100;
            transition: transform 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-inner">
                <div class="header-logo-icon">🍔</div>
                <h1>ND Lanches</h1>
                <div class="tagline">Sabor que conquista, entrega que encanta</div>
                <div id="statusIndicator" class="status-pill open">
                    <span class="status-dot"></span>
                    <span id="statusText">Verificando...</span>
                </div>
            </div>
        </header>

        <div class="two-columns">
            <!-- COLUNA ESQUERDA: CARDÁPIO -->
            <div class="menu-column">
                <div class="tabs-wrapper">
                    <div class="tabs" id="tabsContainer">
                        <button class="tab-btn active" data-cat="TODOS">Todos</button>
                        <button class="tab-btn" data-cat="LANCHE">Lanches</button>
                        <button class="tab-btn" data-cat="BEBIDA">Bebidas</button>
                        <button class="tab-btn" data-cat="PASTEL">Pastéis</button>
                        <button class="tab-btn" data-cat="SOBREMESA">Sobremesas</button>
                    </div>
                </div>
                <div id="productsContainer"></div>
            </div>

            <!-- COLUNA DIREITA: CARRINHO FIXO -->
            <div class="cart-column">
                <div class="cart-panel">
                    <div class="cart-header">
                        <i class="fa-solid fa-bag-shopping"></i> Seu Pedido
                        <span id="cartItemCount" class="cart-badge" style="background: var(--primary); border-radius: 30px; padding: 2px 8px; font-size: 0.7rem;">0</span>
                    </div>
                    <div id="cartItemsList" class="cart-items">
                        <div class="cart-empty">Seu carrinho está vazio</div>
                    </div>
                    <div class="cart-total">
                        <span>Total</span>
                        <span id="cartTotalAmount">R$ 0,00</span>
                    </div>
                    <button id="repeatLastOrderBtn" class="repeat-order-btn" style="display: none;">
                        <i class="fa-regular fa-clock"></i> Repetir último pedido
                    </button>
                    <button class="checkout-btn" id="checkoutBtn">
                        <i class="fa-brands fa-whatsapp"></i> Fechar pedido
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE CUSTOMIZAÇÃO (produto) -->
    <div id="productModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalProductName">Produto</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fa fa-times"></i></button>
            </div>
            <div id="modalProductBody"></div>
            <button id="modalAddToCartBtn" class="checkout-btn" style="background: var(--primary); margin-top: 16px;">Adicionar ao carrinho</button>
        </div>
    </div>

    <!-- MODAL DE FINALIZAÇÃO (detalhes do pedido) -->
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Finalizar Pedido</h3>
                <button class="close-modal" onclick="closeCheckoutModal()"><i class="fa fa-times"></i></button>
            </div>
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" id="customerName" placeholder="Ex: João Silva" required>
            </div>
            <div class="form-group">
                <label>Forma de entrega</label>
                <select id="deliveryType">
                    <option value="RETIRADA">Retirada no local</option>
                    <option value="ENTREGA">Delivery</option>
                </select>
            </div>
            <div id="deliveryFields" style="display: none;">
                <div class="form-group"><input type="text" id="addressStreet" placeholder="Rua, número"></div>
                <div class="form-group"><input type="text" id="addressNeighborhood" placeholder="Bairro"></div>
                <div class="form-group"><input type="text" id="addressReference" placeholder="Ponto de referência (opcional)"></div>
            </div>
            <div class="form-group">
                <label>Pagamento</label>
                <select id="paymentMethod">
                    <option value="PIX">PIX</option>
                    <option value="CARTAO">Cartão (maquininha)</option>
                    <option value="DINHEIRO">Dinheiro</option>
                </select>
            </div>
            <div id="changeField" style="display: none;">
                <div class="form-group"><input type="number" id="changeAmount" placeholder="Troco para quanto? (R$)"></div>
            </div>
            <button id="confirmOrderBtn" class="checkout-btn" style="background: #25D366;">Enviar para WhatsApp</button>
        </div>
    </div>

    <div id="toastMsg" class="toast">Item adicionado!</div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const API_URL = "https://nell-punchiest-proddingly.ngrok-free.dev/api";
        const LOJA_SLUG = "nd-lanches";
        const LOJA_ID = 1;
        const CART_KEY = "ndlanches_cart";
        const LAST_ORDER_KEY = "ndlanches_last_order";

        let products = [];
        let extras = [];
        let cart = [];
        let storeOpen = true;
        let currentProduct = null;
        let selectedExtras = {};
        let selectedRemovals = [];
        let productQuantity = 1;
        let storeInfo = {};

        // Elementos
        const productsContainer = document.getElementById('productsContainer');
        const cartItemsList = document.getElementById('cartItemsList');
        const cartTotalSpan = document.getElementById('cartTotalAmount');
        const cartItemCountSpan = document.getElementById('cartItemCount');
        const repeatOrderBtn = document.getElementById('repeatLastOrderBtn');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const productModal = document.getElementById('productModal');
        const checkoutModal = document.getElementById('checkoutModal');
        const toast = document.getElementById('toastMsg');

        // ==================== FUNÇÕES AUXILIARES ====================
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.style.background = isError ? '#EF4444' : '#1F2937';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function saveCart() {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            updateCartUI();
        }

        function loadCart() {
            const saved = localStorage.getItem(CART_KEY);
            if (saved) {
                try { cart = JSON.parse(saved); } catch(e) { cart = []; }
            }
            updateCartUI();
        }

        function updateCartUI() {
            if (!cartItemsList) return;
            if (cart.length === 0) {
                cartItemsList.innerHTML = '<div class="cart-empty">Seu carrinho está vazio</div>';
                cartTotalSpan.innerText = 'R$ 0,00';
                cartItemCountSpan.innerText = '0';
                repeatOrderBtn.style.display = 'none';
                return;
            }
            let html = '';
            let total = 0;
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                let extrasText = '';
                if (item.extras && item.extras.length) {
                    extrasText = `<div class="cart-item-details">+ ${item.extras.map(e => e.name).join(', ')}</div>`;
                }
                let removalsText = '';
                if (item.removals && item.removals.length) {
                    removalsText = `<div class="cart-item-details">❌ Sem ${item.removals.join(', ')}</div>`;
                }
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name} x${item.quantity}</div>
                            ${removalsText}
                            ${extrasText}
                            <div class="cart-item-price">R$ ${itemTotal.toFixed(2)}</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-qty-btn" onclick="updateQuantity(${idx}, -1)">-</button>
                            <span style="min-width: 25px; text-align:center;">${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateQuantity(${idx}, 1)">+</button>
                            <button class="cart-remove" onclick="removeItem(${idx})"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
            });
            cartItemsList.innerHTML = html;
            cartTotalSpan.innerText = `R$ ${total.toFixed(2)}`;
            cartItemCountSpan.innerText = cart.reduce((s,i)=>s+i.quantity,0);
            // Mostrar botão de repetir pedido se existir último pedido salvo
            const lastOrder = localStorage.getItem(LAST_ORDER_KEY);
            repeatOrderBtn.style.display = lastOrder ? 'flex' : 'none';
        }

        window.updateQuantity = (idx, delta) => {
            const newQty = cart[idx].quantity + delta;
            if (newQty < 1) return;
            cart[idx].quantity = newQty;
            saveCart();
        };
        window.removeItem = (idx) => {
            cart.splice(idx, 1);
            saveCart();
        };

        // Repetir último pedido
        function repeatLastOrder() {
            const lastOrder = localStorage.getItem(LAST_ORDER_KEY);
            if (!lastOrder) return;
            try {
                const lastCart = JSON.parse(lastOrder);
                if (lastCart.length) {
                    cart = lastCart.map(item => ({ ...item }));
                    saveCart();
                    showToast("🔄 Último pedido adicionado ao carrinho!");
                }
            } catch(e) {}
        }

        // ==================== API E RENDERIZAÇÃO ====================
        async function fetchStoreStatus() {
            try {
                const res = await fetch(`${API_URL}/loja/${LOJA_SLUG}/status`);
                if (res.ok) storeOpen = await res.json();
                const storeRes = await fetch(`${API_URL}/loja/${LOJA_SLUG}`);
                if (storeRes.ok) storeInfo = await storeRes.json();
                const statusDiv = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                if (storeOpen) {
                    statusDiv.className = "status-pill open";
                    statusText.innerText = "Aberto agora";
                } else {
                    statusDiv.className = "status-pill closed";
                    statusText.innerText = "Fechado";
                }
            } catch(e) { console.warn(e); }
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/produtos/loja/${LOJA_ID}`);
                if (res.ok) products = await res.json();
                const resExtra = await fetch(`${API_URL}/adicionais/loja/${LOJA_ID}`);
                if (resExtra.ok) extras = await resExtra.json();
                renderProducts(products);
            } catch(e) { console.error(e); productsContainer.innerHTML = '<p>Erro ao carregar cardápio</p>'; }
        }

        function renderProducts(productList, filter = "TODOS") {
            let filtered = productList.filter(p => p.ativo !== false);
            if (filter !== "TODOS") filtered = filtered.filter(p => p.categoria === filter);
            if (filtered.length === 0) {
                productsContainer.innerHTML = '<p style="text-align:center; padding: 40px;">Nenhum produto encontrado</p>';
                return;
            }
            // Agrupar por categoria
            const grouped = {};
            filtered.forEach(p => { grouped[p.categoria] = grouped[p.categoria] || []; grouped[p.categoria].push(p); });
            let html = '';
            for (const [cat, items] of Object.entries(grouped)) {
                const catName = { LANCHE:"🍔 Lanches", BEBIDA:"🥤 Bebidas", PASTEL:"🥟 Pastéis", SOBREMESA:"🍦 Sobremesas" }[cat] || cat;
                html += `<div class="section-title"><span>${catName}</span></div><div class="products-grid">`;
                items.forEach(p => {
                    const priceFormatted = p.preco.toFixed(2).replace('.',',');
                    const imgHtml = p.imagemUrl ? `<img src="${p.imagemUrl}" alt="${p.nome}" loading="lazy">` : `<div class="emoji-placeholder">${p.emoji || '🍔'}</div>`;
                    const tagHtml = p.tagTexto ? `<div class="product-tag">${p.tagTexto}</div>` : '';
                    html += `
                        <div class="product-card" data-id="${p.id}">
                            <div class="product-img">
                                ${imgHtml}
                                ${tagHtml}
                            </div>
                            <div class="product-info">
                                <div class="product-title">${p.nome}</div>
                                <div class="product-desc">${p.descricao || ''}</div>
                                <div class="product-footer">
                                    <span class="product-price">R$ ${priceFormatted}</span>
                                    <button class="add-btn" data-id="${p.id}" aria-label="Adicionar ${p.nome}"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            productsContainer.innerHTML = html;
            // Eventos dos cards
            document.querySelectorAll('.product-card').forEach(card => {
                const id = parseInt(card.dataset.id);
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.add-btn')) return;
                    openProductModal(id);
                });
                const addBtn = card.querySelector('.add-btn');
                if (addBtn) addBtn.addEventListener('click', (e) => { e.stopPropagation(); openProductModal(id); });
            });
        }

        // ==================== MODAL DE PRODUTO ====================
        function openProductModal(productId) {
            if (!storeOpen) { showToast("Loja fechada, não é possível fazer pedidos", true); return; }
            const product = products.find(p => p.id === productId);
            if (!product) return;
            currentProduct = product;
            selectedExtras = {};
            selectedRemovals = [];
            productQuantity = 1;
            // Montar HTML do modal
            const ingredients = product.descricao ? product.descricao.split(',').map(i=>i.trim()).filter(i=>i) : [];
            const extrasHtml = extras.map(ext => `
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center;">
                    <span>${ext.emoji || '➕'} ${ext.nome} + R$ ${ext.preco.toFixed(2)}</span>
                    <button class="extra-toggle" data-id="${ext.id}" style="background: var(--border); border: none; padding: 6px 12px; border-radius: 30px;">Adicionar</button>
                </div>
            `).join('');
            const removalsHtml = ingredients.map(ing => `
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>${ing}</span>
                    <button class="removal-toggle" data-ing="${ing}" style="background: var(--border); border: none; padding: 4px 12px; border-radius: 30px;">Remover</button>
                </div>
            `).join('');
            document.getElementById('modalProductName').innerText = product.nome;
            document.getElementById('modalProductBody').innerHTML = `
                <div class="form-group">
                    <label>Ingredientes (clique para remover)</label>
                    <div id="removalsList">${removalsHtml || '<p>Sem ingredientes destacados</p>'}</div>
                </div>
                <div class="form-group">
                    <label>Adicionais</label>
                    <div id="extrasList">${extrasHtml || '<p>Nenhum adicional</p>'}</div>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button id="decQty" style="width: 40px; height: 40px; border-radius: 30px;">-</button>
                        <span id="qtyValue">1</span>
                        <button id="incQty" style="width: 40px; height: 40px; border-radius: 30px;">+</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="productObservation" rows="2" placeholder="Ex: sem cebola, ponto da carne..."></textarea>
                </div>
                <div class="cart-total" style="margin-top: 12px;">
                    <span>Subtotal</span>
                    <span id="modalTotalPrice">R$ ${product.preco.toFixed(2)}</span>
                </div>
            `;
            productModal.classList.add('open');
            // Eventos de quantidade
            document.getElementById('decQty').onclick = () => { if(productQuantity>1){ productQuantity--; document.getElementById('qtyValue').innerText=productQuantity; updateModalTotal(); } };
            document.getElementById('incQty').onclick = () => { productQuantity++; document.getElementById('qtyValue').innerText=productQuantity; updateModalTotal(); };
            // Eventos de extras
            document.querySelectorAll('.extra-toggle').forEach(btn => {
                btn.onclick = () => {
                    const id = parseInt(btn.dataset.id);
                    const extra = extras.find(e=>e.id===id);
                    if(selectedExtras[id]) {
                        delete selectedExtras[id];
                        btn.style.background = "var(--border)";
                        btn.innerText = "Adicionar";
                    } else {
                        selectedExtras[id] = extra;
                        btn.style.background = "var(--primary)";
                        btn.style.color = "white";
                        btn.innerText = "Remover";
                    }
                    updateModalTotal();
                };
            });
            // Eventos de remoção
            document.querySelectorAll('.removal-toggle').forEach(btn => {
                btn.onclick = () => {
                    const ing = btn.dataset.ing;
                    if(selectedRemovals.includes(ing)) {
                        selectedRemovals = selectedRemovals.filter(i=>i!==ing);
                        btn.style.background = "var(--border)";
                        btn.innerText = "Remover";
                    } else {
                        selectedRemovals.push(ing);
                        btn.style.background = "#EF4444";
                        btn.style.color = "white";
                        btn.innerText = "Removido";
                    }
                    updateModalTotal();
                };
            });
            function updateModalTotal() {
                let extraSum = Object.values(selectedExtras).reduce((s,e)=>s+e.preco,0);
                let total = (product.preco + extraSum) * productQuantity;
                document.getElementById('modalTotalPrice').innerText = `R$ ${total.toFixed(2)}`;
            }
            updateModalTotal();
            // Botão adicionar ao carrinho
            document.getElementById('modalAddToCartBtn').onclick = () => {
                const extraList = Object.values(selectedExtras);
                const obs = document.getElementById('productObservation').value;
                cart.push({
                    id: product.id,
                    name: product.nome,
                    price: product.preco,
                    quantity: productQuantity,
                    extras: extraList,
                    removals: selectedRemovals,
                    observation: obs,
                    totalPrice: (product.preco + extraList.reduce((s,e)=>s+e.preco,0)) * productQuantity
                });
                saveCart();
                closeModal();
                showToast(`✅ ${productQuantity}x ${product.nome} adicionado!`);
            };
        }

        function updateModalTotal() { /* já definido dentro do escopo, mas manter */ }

        function closeModal() { productModal.classList.remove('open'); }
        function closeCheckoutModal() { checkoutModal.classList.remove('open'); }

        // ==================== FINALIZAR PEDIDO ====================
        function openCheckout() {
            if (!storeOpen) { showToast("Loja fechada, pedidos não são aceitos", true); return; }
            if (cart.length === 0) { showToast("Adicione itens ao carrinho primeiro", true); return; }
            checkoutModal.classList.add('open');
        }

        function setupCheckoutEvents() {
            const deliverySelect = document.getElementById('deliveryType');
            const deliveryFields = document.getElementById('deliveryFields');
            const paymentSelect = document.getElementById('paymentMethod');
            const changeField = document.getElementById('changeField');
            deliverySelect.addEventListener('change', () => {
                deliveryFields.style.display = deliverySelect.value === 'ENTREGA' ? 'block' : 'none';
            });
            paymentSelect.addEventListener('change', () => {
                changeField.style.display = paymentSelect.value === 'DINHEIRO' ? 'block' : 'none';
            });
            document.getElementById('confirmOrderBtn').onclick = async () => {
                const nome = document.getElementById('customerName').value.trim();
                if (!nome) { showToast("Digite seu nome", true); return; }
                const tipo = deliverySelect.value;
                let endereco = '';
                if (tipo === 'ENTREGA') {
                    const rua = document.getElementById('addressStreet').value.trim();
                    const bairro = document.getElementById('addressNeighborhood').value.trim();
                    if (!rua || !bairro) { showToast("Preencha endereço completo", true); return; }
                    endereco = `📍 ${rua}, ${bairro}`;
                    const ref = document.getElementById('addressReference').value.trim();
                    if (ref) endereco += `\n📍 Ref: ${ref}`;
                }
                const pagamento = paymentSelect.value;
                let trocoInfo = '';
                if (pagamento === 'DINHEIRO') {
                    const troco = document.getElementById('changeAmount').value;
                    trocoInfo = troco ? `\n💵 Troco para R$ ${troco}` : '\n💵 Sem troco';
                }
                // Montar mensagem WhatsApp
                let itensMsg = '';
                let totalPedido = 0;
                cart.forEach(item => {
                    const itemTotal = (item.price + (item.extras.reduce((s,e)=>s+e.preco,0))) * item.quantity;
                    totalPedido += itemTotal;
                    itensMsg += `▪️ ${item.quantity}x ${item.name} — R$ ${itemTotal.toFixed(2)}\n`;
                    if (item.removals.length) itensMsg += `   ❌ Sem: ${item.removals.join(', ')}\n`;
                    if (item.extras.length) itensMsg += `   ➕ Extra: ${item.extras.map(e=>e.nome).join(', ')}\n`;
                    if (item.observation) itensMsg += `   📝 ${item.observation}\n`;
                });
                const msg = `*NOVO PEDIDO - ND LANCHES*\n\n*Cliente:* ${nome}\n*Tipo:* ${tipo === 'ENTREGA' ? 'Entrega' : 'Retirada'}\n${endereco ? endereco+'\n' : ''}\n━━━━━━━━━━━━━━━━\n*ITENS:*\n${itensMsg}\n━━━━━━━━━━━━━━━━\n*TOTAL: R$ ${totalPedido.toFixed(2)}*\n\n*Pagamento:* ${pagamento}${trocoInfo}`;
                // Salvar último pedido
                localStorage.setItem(LAST_ORDER_KEY, JSON.stringify(cart));
                // Enviar para API (opcional, mas manter)
                try {
                    await fetch(`${API_URL}/pedidos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nomeCliente: nome,
                            total: totalPedido,
                            status: 'RECEBIDO',
                            itensJson: JSON.stringify(cart),
                            observacao: `${tipo} | ${pagamento}`,
                            loja: { id: LOJA_ID }
                        })
                    });
                } catch(e) { console.warn(e); }
                window.open(`https://wa.me/${storeInfo.whatsapp || "5517999999999"}?text=${encodeURIComponent(msg)}`, '_blank');
                cart = [];
                saveCart();
                closeCheckoutModal();
                showToast("Pedido enviado! Você será redirecionado ao WhatsApp.");
            };
        }

        // ==================== INICIALIZAÇÃO ====================
        async function init() {
            loadCart();
            await fetchStoreStatus();
            await fetchProducts();
            setupCheckoutEvents();
            checkoutBtn.onclick = openCheckout;
            repeatOrderBtn.onclick = repeatLastOrder;
            // Filtro de categorias
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const cat = btn.dataset.cat;
                    renderProducts(products, cat);
                });
            });
        }
        init();
    </script>
</body>
</html>
