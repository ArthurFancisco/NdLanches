<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ND Lanches</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* (estilos mantidos iguais ao seu original, apenas adicionei um pequeno ajuste para o painel de configuração) */
        /* ... */
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">
        <div class="topbar-icon">🍔</div>
        <div class="topbar-title">ND <span>ADMIN</span></div>
    </div>
    <div class="key-wrap">
        <i class="fa-solid fa-key"></i>
        <input type="password" id="adminKey" placeholder="Chave admin" value="arthur123">
    </div>
</div>

<div class="dashboard">

    <!-- COL 1: Status + Configurações da Loja + Form Produto -->
    <div style="display:flex;flex-direction:column;gap:20px">
        <div class="panel">
            <div class="panel-header"><h2><i class="fa-solid fa-circle-dot"></i> Status da Loja</h2></div>
            <div class="panel-body">
                <div class="status-display">
                    <div class="status-info">
                        <div class="status-led" id="statusLed"></div>
                        <div class="status-text">
                            <strong id="statusLabel">Carregando...</strong>
                            <span id="statusSub">Aguardando</span>
                        </div>
                    </div>
                    <button class="btn-toggle" id="btnStatus" onclick="alternarStatus()" disabled>Aguarde</button>
                </div>
            </div>
        </div>

        <!-- NOVO: Configurações da Loja -->
        <div class="panel">
            <div class="panel-header"><h2><i class="fa-solid fa-shop"></i> Configurações</h2></div>
            <div class="panel-body">
                <div class="form-group">
                    <label>WhatsApp (com DDD, sem máscara)</label>
                    <input type="text" id="lojaWhatsapp" placeholder="5517999999999">
                </div>
                <div class="form-group">
                    <label>Mensagem quando loja está fechada</label>
                    <input type="text" id="lojaMensagemFechado" placeholder="Voltamos em breve!">
                </div>
                <button class="btn-save" onclick="salvarConfigLoja()">
                    <i class="fa-solid fa-floppy-disk fa-sm"></i> Salvar Configurações
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><h2><i class="fa-solid fa-burger"></i> <span id="formTitle">Novo Produto</span></h2></div>
            <div class="panel-body">
                <div class="edit-banner-bar" id="editBanner"><i class="fa-solid fa-pencil fa-xs"></i> Modo edição</div>
                <div class="form-group"><label>Nome</label><input type="text" id="nome" placeholder="Ex: X-Burguer Especial"></div>
                <div class="form-group"><label>Descrição / Ingredientes</label>
                    <input type="text" id="descricao" placeholder="Ex: Pão, hambúrguer, queijo, alface, tomate"></div>
                <div class="form-row">
                    <div class="form-group"><label>Preço (R$)</label><input type="number" id="preco" step="0.01" min="0" placeholder="0,00"></div>
                    <div class="form-group"><label>Categoria</label>
                        <select id="categoria">
                            <option value="LANCHE">🍔 Lanche</option>
                            <option value="BEBIDA">🥤 Bebida</option>
                            <option value="PORCAO">🍟 Porção</option>
                            <option value="SOBREMESA">🍦 Sobremesa</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Emoji</label><input type="text" id="emoji" placeholder="🍔" maxlength="4"></div>
                    <!-- Campo imagem removido pois não existe no backend -->
                </div>
                <button class="btn-save" id="btnSalvar" onclick="salvarProduto()">
                    <i class="fa-solid fa-floppy-disk fa-sm"></i> <span id="btnSalvarLabel">Salvar no Cardápio</span>
                </button>
                <button class="btn-cancel" id="btnCancelar" onclick="cancelarEdicao()" style="display:none">
                    <i class="fa-solid fa-xmark fa-xs"></i> Cancelar edição
                </button>
            </div>
        </div>
    </div>

    <!-- COL 2: Adicionais + Banners (igual ao original) -->
    <!-- ... (mantenha o mesmo conteúdo) ... -->

    <!-- COL 3: Lista Produtos (igual ao original) -->
    <!-- ... -->

</div>

<!-- PEDIDOS (igual ao original) -->
<!-- ... -->

<div class="feedback" id="feedback">
    <i class="fa-solid fa-circle-check"></i>
    <span id="feedbackMsg">OK</span>
</div>

<script>
    const API_URL     = "https://nd-lanches-api.onrender.com/api";
    const LOJA_SLUG   = "nd-lanches";
    const LOJA_ID_NUM = 1;
    const REFRESH_INTERVAL = 30;

    let lojaAberta    = false;
    let idEdicao      = null;
    let adicEdicaoId  = null;
    let bannerEdicaoId= null;
    let filtroPedidos = 'hoje';
    let ultimosPedidosIds = new Set();
    let refreshTimer  = null;
    let refreshCountdown = REFRESH_INTERVAL;

    const STATUS_PROX  = { RECEBIDO:'PREPARO', PREPARO:'PRONTO', PRONTO:'ENTREGUE', ENTREGUE:'ENTREGUE', CANCELADO:'CANCELADO' };
    const STATUS_LABEL = { RECEBIDO:'📥 Recebido', PREPARO:'🔥 Em preparo', PRONTO:'✅ Pronto', ENTREGUE:'🏍️ Entregue', CANCELADO:'❌ Cancelado' };

    /* ===================== CARREGAR DADOS ===================== */
    async function carregarDados() {
        try {
            // Status da loja
            const rS = await fetch(`${API_URL}/loja/${LOJA_SLUG}/status`);
            if (rS.ok) { lojaAberta = await rS.json(); atualizarBotaoStatus(); }

            // Dados da loja para configuração
            const rLoja = await fetch(`${API_URL}/loja/${LOJA_SLUG}`);
            if (rLoja.ok) {
                const loja = await rLoja.json();
                document.getElementById('lojaWhatsapp').value = loja.whatsapp || '';
                document.getElementById('lojaMensagemFechado').value = loja.mensagemFechado || '';
            }

            // Produtos
            const rP = await fetch(`${API_URL}/produtos/loja/${LOJA_ID_NUM}`);
            if (rP.ok) renderizarProdutos(await rP.json());

            // Adicionais
            const rA = await fetch(`${API_URL}/adicionais/loja/${LOJA_ID_NUM}`);
            if (rA.ok) renderizarAdics(await rA.json());

            // Banners (admin)
            const key = document.getElementById('adminKey').value;
            const rBan = await fetch(`${API_URL}/banners/loja/${LOJA_ID_NUM}`, { headers:{'Admin-Key':key} });
            if (rBan.ok) renderizarBanners(await rBan.json());

            await carregarPedidos();
            iniciarAutoRefresh();

        } catch (e) {
            console.error(e);
            feedback("Erro ao conectar com a API", false);
        }
    }

    /* ===================== CONFIGURAÇÕES DA LOJA ===================== */
    async function salvarConfigLoja() {
        const key = document.getElementById('adminKey').value;
        const whatsapp = document.getElementById('lojaWhatsapp').value.trim();
        const mensagemFechado = document.getElementById('lojaMensagemFechado').value.trim();

        const payload = {
            whatsapp,
            mensagemFechado
            // Não permitimos alterar slug e nome via admin (pode ser feito depois)
        };

        try {
            const response = await fetch(`${API_URL}/loja/${LOJA_SLUG}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Admin-Key': key
                },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                feedback("Configurações salvas!", true);
            } else {
                const err = await response.text();
                feedback("Erro: " + err, false);
            }
        } catch (e) {
            feedback("Erro de conexão", false);
        }
    }

    /* ===================== STATUS ===================== */
    function atualizarBotaoStatus() {
        const btn = document.getElementById('btnStatus');
        document.getElementById('statusLed').className    = `status-led ${lojaAberta?'on':'off'}`;
        document.getElementById('statusLabel').textContent = lojaAberta ? 'Loja Aberta' : 'Loja Fechada';
        document.getElementById('statusSub').textContent   = lojaAberta ? 'Aceitando pedidos' : 'Fora do horário';
        btn.disabled  = false;
        btn.className = `btn-toggle ${lojaAberta?'fechar':'abrir'}`;
        btn.innerHTML = lojaAberta
            ? '<i class="fa-solid fa-circle-stop fa-xs"></i> Fechar loja'
            : '<i class="fa-solid fa-circle-play fa-xs"></i> Abrir loja';
    }

    async function alternarStatus() {
        const key = document.getElementById('adminKey').value;
        const nova = !lojaAberta;
        try {
            const r = await fetch(`${API_URL}/loja/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Admin-Key': key },
                body: JSON.stringify(nova)
            });
            if (r.ok) {
                lojaAberta = nova;
                atualizarBotaoStatus();
                feedback(`Loja ${nova ? 'aberta' : 'fechada'}!`, true);
            } else {
                feedback("Erro ao alterar status.", false);
            }
        } catch { feedback("Erro de conexão.", false); }
    }

    /* ===================== PRODUTOS ===================== */
    // (mantenha as funções de produto do seu código original, ajustando apenas para não usar imagemUrl)
    function renderizarProdutos(prods) {
        document.getElementById('prodCount').textContent = prods?.length || 0;
        const lista = document.getElementById('lista-produtos-admin');
        if (!prods?.length) { lista.innerHTML = `<div class="empty-adm"><i class="fa-solid fa-box-open"></i><p>Nenhum produto.</p></div>`; return; }
        const cats = {LANCHE:'🍔 Lanches',BEBIDA:'🥤 Bebidas',PORCAO:'🍟 Porções',SOBREMESA:'🍦 Sobremesas'};
        const grupos = {};
        prods.forEach(p => { (grupos[p.categoria||'OUTROS'] ??= []).push(p); });
        lista.innerHTML = Object.entries(grupos).map(([cat, itens]) =>
            `<div class="sec-div"><span>${cats[cat]||cat}</span></div>` +
            itens.map(p => `
            <div class="prod-item">
                <div class="prod-emoji">${p.emoji||'🍽️'}</div>
                <div class="prod-info">
                    <strong title="${p.nome}">${p.nome}</strong>
                    <div class="prod-meta">
                        <span class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                        <span class="prod-cat">${p.categoria}</span>
                    </div>
                </div>
                <div class="prod-actions">
                    <button class="btn-ic edit" onclick='prepararEdicao(${JSON.stringify(p)})'><i class="fa-solid fa-pen fa-xs"></i></button>
                    <button class="btn-ic del" onclick="excluirProduto(${p.id})"><i class="fa-solid fa-trash fa-xs"></i></button>
                </div>
            </div>`).join('')
        ).join('');
    }

    function prepararEdicao(p) {
        idEdicao = p.id;
        document.getElementById('nome').value      = p.nome||'';
        document.getElementById('descricao').value = p.descricao||'';
        document.getElementById('preco').value     = p.preco||'';
        document.getElementById('categoria').value = p.categoria||'LANCHE';
        document.getElementById('emoji').value     = p.emoji||'';
        document.getElementById('formTitle').textContent      = p.nome;
        document.getElementById('btnSalvarLabel').textContent = 'Salvar Alterações';
        document.getElementById('btnCancelar').style.display  = 'block';
        document.getElementById('editBanner').classList.add('vis');
        document.querySelector('.panel:has(#btnSalvar)').scrollIntoView({behavior:'smooth',block:'start'});
    }

    function cancelarEdicao() {
        idEdicao = null;
        ['nome','descricao','preco','emoji'].forEach(id => document.getElementById(id).value='');
        document.getElementById('categoria').value            = 'LANCHE';
        document.getElementById('formTitle').textContent      = 'Novo Produto';
        document.getElementById('btnSalvarLabel').textContent = 'Salvar no Cardápio';
        document.getElementById('btnCancelar').style.display  = 'none';
        document.getElementById('editBanner').classList.remove('vis');
    }

    async function salvarProduto() {
        const key = document.getElementById('adminKey').value;
        const nome = document.getElementById('nome').value.trim();
        const prec = parseFloat(document.getElementById('preco').value);
        const cat  = document.getElementById('categoria').value;
        if (!nome || isNaN(prec)) { feedback("Preencha nome e preço.", false); return; }
        const emojiMap = {LANCHE:'🍔',BEBIDA:'🥤',PORCAO:'🍟',SOBREMESA:'🍦'};
        const produto = {
            nome, preco: prec, categoria: cat, ativo: true, ordem: 0,
            descricao: document.getElementById('descricao').value.trim(),
            emoji: document.getElementById('emoji').value.trim() || emojiMap[cat] || '🍽️',
            loja: { id: LOJA_ID_NUM }
        };
        const url = idEdicao ? `${API_URL}/produtos/${idEdicao}` : `${API_URL}/produtos`;
        const btn = document.getElementById('btnSalvar');
        btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin fa-xs"></i> Salvando...';
        try {
            const r = await fetch(url,{method:idEdicao?'PUT':'POST',headers:{'Content-Type':'application/json','Admin-Key':key},body:JSON.stringify(produto)});
            if (r.ok) { feedback(idEdicao?'Produto atualizado!':'Produto cadastrado!', true); cancelarEdicao(); carregarDados(); }
            else { feedback("Erro ao salvar.", false); }
        } catch { feedback("Erro de conexão.", false); }
        finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-floppy-disk fa-xs"></i> <span id="btnSalvarLabel">Salvar no Cardápio</span>'; }
    }

    async function excluirProduto(id) {
        if (!confirm("Remover este produto?")) return;
        const key = document.getElementById('adminKey').value;
        try {
            const r = await fetch(`${API_URL}/produtos/${id}`,{method:'DELETE',headers:{'Admin-Key':key}});
            if (r.ok) { feedback("Removido!", true); carregarDados(); }
            else { feedback("Erro ao remover.", false); }
        } catch { feedback("Erro de conexão.", false); }
    }

    /* ===================== ADICIONAIS (mantido igual) ===================== */
    function renderizarAdics(adics) {
        document.getElementById('adicCount').textContent = adics?.length || 0;
        const lista = document.getElementById('lista-adicionais');
        if (!adics?.length) { lista.innerHTML=`<div class="empty-adm"><i class="fa-solid fa-circle-plus"></i><p>Nenhum adicional.</p></div>`; return; }
        lista.innerHTML = adics.map(a => `
        <div class="adic-item">
            <div class="adic-em">${a.emoji||'➕'}</div>
            <div class="adic-info-col">
                <strong>${a.nome}</strong>
                <span>+ R$ ${parseFloat(a.preco).toFixed(2)}</span>
            </div>
            <div class="prod-actions">
                <button class="btn-ic edit" onclick='prepararEdicaoAdic(${JSON.stringify(a)})'><i class="fa-solid fa-pen fa-xs"></i></button>
                <button class="btn-ic del" onclick="excluirAdic(${a.id})"><i class="fa-solid fa-trash fa-xs"></i></button>
            </div>
        </div>`).join('');
    }

    function prepararEdicaoAdic(a) {
        adicEdicaoId = a.id;
        document.getElementById('adic-nome').value  = a.nome||'';
        document.getElementById('adic-preco').value = a.preco||'';
        document.getElementById('adic-emoji').value = a.emoji||'';
        document.getElementById('adicFormTitle').textContent = a.nome;
        document.getElementById('adicBtnLabel').textContent  = 'Salvar Alterações';
        document.getElementById('adicCancelar').style.display = 'block';
        document.getElementById('adicEditBanner').classList.add('vis');
    }

    function cancelarEdicaoAdic() {
        adicEdicaoId = null;
        ['adic-nome','adic-preco','adic-emoji'].forEach(id => document.getElementById(id).value='');
        document.getElementById('adicFormTitle').textContent   = 'Novo Adicional';
        document.getElementById('adicBtnLabel').textContent    = 'Salvar Adicional';
        document.getElementById('adicCancelar').style.display  = 'none';
        document.getElementById('adicEditBanner').classList.remove('vis');
    }

    async function salvarAdic() {
        const key = document.getElementById('adminKey').value;
        const nome = document.getElementById('adic-nome').value.trim();
        const prec = parseFloat(document.getElementById('adic-preco').value);
        if (!nome || isNaN(prec)) { feedback("Preencha nome e preço do adicional.", false); return; }
        const payload = { nome, preco: prec, emoji: document.getElementById('adic-emoji').value.trim() || '➕', ativo: true, loja: { id: LOJA_ID_NUM } };
        const url = adicEdicaoId ? `${API_URL}/adicionais/${adicEdicaoId}` : `${API_URL}/adicionais`;
        try {
            const r = await fetch(url,{method:adicEdicaoId?'PUT':'POST',headers:{'Content-Type':'application/json','Admin-Key':key},body:JSON.stringify(payload)});
            if (r.ok) { feedback(adicEdicaoId?'Adicional atualizado!':'Adicional cadastrado!',true); cancelarEdicaoAdic(); carregarDados(); }
            else { feedback("Erro ao salvar adicional.", false); }
        } catch { feedback("Erro de conexão.", false); }
    }

    async function excluirAdic(id) {
        if (!confirm("Remover este adicional?")) return;
        const key = document.getElementById('adminKey').value;
        try {
            const r = await fetch(`${API_URL}/adicionais/${id}`,{method:'DELETE',headers:{'Admin-Key':key}});
            if (r.ok) { feedback("Adicional removido!",true); carregarDados(); }
            else { feedback("Erro ao remover.",false); }
        } catch { feedback("Erro de conexão.",false); }
    }

    /* ===================== BANNERS (mantido igual) ===================== */
    function renderizarBanners(banners) {
        document.getElementById('bannerCount').textContent = banners?.length || 0;
        const lista = document.getElementById('lista-banners');
        if (!banners?.length) { lista.innerHTML = `<div class="empty-adm"><i class="fa-solid fa-bullhorn"></i><p>Nenhum banner.</p></div>`; return; }
        lista.innerHTML = banners.map(b => `
        <div class="banner-item">
            <div class="banner-item-em">${b.emoji||'📢'}</div>
            <div class="banner-info">
                <strong>${b.titulo}</strong>
                <span>${b.descricao||''}</span>
            </div>
            <div style="display:flex;align-items:center;gap:7px">
                <span class="banner-ativo-pill ${b.ativo?'on':'off'}">${b.ativo?'Ativo':'Inativo'}</span>
                <button class="btn-ic ${b.ativo?'toggle-on':'toggle-off'}" onclick="toggleBanner(${b.id})"
                    title="${b.ativo?'Desativar':'Ativar'}">
                    <i class="fa-solid ${b.ativo?'fa-eye':'fa-eye-slash'} fa-xs"></i>
                </button>
                <button class="btn-ic edit" onclick='prepararEdicaoBanner(${JSON.stringify(b)})'><i class="fa-solid fa-pen fa-xs"></i></button>
                <button class="btn-ic del" onclick="excluirBanner(${b.id})"><i class="fa-solid fa-trash fa-xs"></i></button>
            </div>
        </div>`).join('');
    }

    function prepararEdicaoBanner(b) {
        bannerEdicaoId = b.id;
        document.getElementById('banner-titulo').value = b.titulo||'';
        document.getElementById('banner-desc').value   = b.descricao||'';
        document.getElementById('banner-cor').value    = b.cor||'amarelo';
        document.getElementById('banner-emoji').value  = b.emoji||'🔥';
        document.getElementById('banner-ativo').checked = b.ativo||false;
        document.getElementById('bannerFormTitle').textContent = b.titulo;
        document.getElementById('bannerBtnLabel').textContent  = 'Salvar Alterações';
        document.getElementById('bannerCancelar').style.display = 'block';
        document.getElementById('bannerEditBanner').classList.add('vis');
    }

    function cancelarEdicaoBanner() {
        bannerEdicaoId = null;
        ['banner-titulo','banner-desc','banner-emoji'].forEach(id => document.getElementById(id).value='');
        document.getElementById('banner-cor').value   = 'amarelo';
        document.getElementById('banner-ativo').checked = false;
        document.getElementById('bannerFormTitle').textContent  = 'Novo Banner';
        document.getElementById('bannerBtnLabel').textContent   = 'Publicar Banner';
        document.getElementById('bannerCancelar').style.display = 'none';
        document.getElementById('bannerEditBanner').classList.remove('vis');
    }

    async function salvarBanner() {
        const key   = document.getElementById('adminKey').value;
        const titulo = document.getElementById('banner-titulo').value.trim();
        if (!titulo) { feedback("Preencha o título do banner.", false); return; }
        const payload = {
            titulo,
            descricao: document.getElementById('banner-desc').value.trim(),
            cor:       document.getElementById('banner-cor').value,
            emoji:     document.getElementById('banner-emoji').value.trim() || '🔥',
            ativo:     document.getElementById('banner-ativo').checked,
            loja:      { id: LOJA_ID_NUM }
        };
        const url = bannerEdicaoId ? `${API_URL}/banners/${bannerEdicaoId}` : `${API_URL}/banners`;
        try {
            const r = await fetch(url,{method:bannerEdicaoId?'PUT':'POST',headers:{'Content-Type':'application/json','Admin-Key':key},body:JSON.stringify(payload)});
            if (r.ok) { feedback(bannerEdicaoId?'Banner atualizado!':'Banner publicado!',true); cancelarEdicaoBanner(); carregarDados(); }
            else { feedback("Erro ao salvar banner.", false); }
        } catch { feedback("Erro de conexão.", false); }
    }

    async function toggleBanner(id) {
        const key = document.getElementById('adminKey').value;
        try {
            const r = await fetch(`${API_URL}/banners/${id}/toggle`, { method: 'PATCH', headers: { 'Admin-Key': key } });
            if (r.ok) { feedback("Banner atualizado!", true); carregarDados(); }
            else { feedback("Erro ao atualizar.", false); }
        } catch { feedback("Erro de conexão.", false); }
    }

    async function excluirBanner(id) {
        if (!confirm("Remover este banner?")) return;
        const key = document.getElementById('adminKey').value;
        try {
            const r = await fetch(`${API_URL}/banners/${id}`,{method:'DELETE',headers:{'Admin-Key':key}});
            if (r.ok) { feedback("Banner removido!",true); carregarDados(); }
            else { feedback("Erro ao remover.",false); }
        } catch { feedback("Erro de conexão.",false); }
    }

    /* ===================== PEDIDOS ===================== */
    async function carregarPedidos() {
        const key  = document.getElementById('adminKey').value;
        const rota = filtroPedidos === 'hoje'
            ? `${API_URL}/pedidos/loja/${LOJA_ID_NUM}/hoje`
            : `${API_URL}/pedidos/loja/${LOJA_ID_NUM}`;
        try {
            const r = await fetch(rota, { headers: { 'Admin-Key': key } });
            if (r.ok) renderizarPedidos(await r.json());
            else renderizarPedidos([]);
        } catch (e) { console.error(e); }
    }

    function filtrarPedidos(tipo, btn) {
        filtroPedidos = tipo;
        document.querySelectorAll('.filtro-btn').forEach(b => b.className = 'filtro-btn inativo');
        btn.className = 'filtro-btn ativo';
        carregarPedidos();
    }

    function iniciarAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshCountdown = REFRESH_INTERVAL;

        const countdownTimer = setInterval(() => {
            refreshCountdown--;
            const label = document.getElementById('refreshLabel');
            if (label) label.textContent = `Atualiza em ${refreshCountdown}s`;
            if (refreshCountdown <= 0) refreshCountdown = REFRESH_INTERVAL;
        }, 1000);

        refreshTimer = setInterval(async () => {
            refreshCountdown = REFRESH_INTERVAL;
            await carregarPedidos();
        }, REFRESH_INTERVAL * 1000);

        window.addEventListener('beforeunload', () => {
            clearInterval(refreshTimer);
            clearInterval(countdownTimer);
        });
    }

    // Função unificada e corrigida
    async function avancarStatus(id, statusAtual) {
        const prox = STATUS_PROX[statusAtual];
        if (!prox || prox === statusAtual) return;
        const key = document.getElementById('adminKey').value;
        try {
            const response = await fetch(`${API_URL}/pedidos/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Admin-Key': key },
                body: JSON.stringify({ status: prox })
            });
            if (response.ok) {
                feedback(`Pedido #${id} movido para ${prox}`, true);
                carregarPedidos();
            } else {
                const erro = await response.text();
                feedback("Erro: " + erro, false);
            }
        } catch { feedback("Erro de conexão.", false); }
    }

    async function excluirPedido(id) {
        if (!confirm('Remover este pedido do histórico?')) return;
        const key = document.getElementById('adminKey').value;
        try {
            await fetch(`${API_URL}/pedidos/${id}`, { method:'DELETE', headers:{'Admin-Key':key} });
            carregarPedidos();
        } catch { feedback('Erro ao remover pedido.', false); }
    }

    function renderizarPedidos(pedidos) {
        const total = pedidos.reduce((s, p) => s + parseFloat(p.total), 0);
        document.getElementById('pedidos-qtd').textContent     = pedidos.length;
        document.getElementById('pedidos-receita').textContent = `R$ ${total.toFixed(2)}`;

        const novosIds = new Set(pedidos.map(p => p.id));
        const novos    = pedidos.filter(p => !ultimosPedidosIds.has(p.id) && ultimosPedidosIds.size > 0);
        ultimosPedidosIds = novosIds;

        if (novos.length > 0) {
            feedback(`🔔 ${novos.length} novo(s) pedido(s)!`, true);
        }

        const lista = document.getElementById('lista-pedidos');
        if (!pedidos.length) {
            lista.innerHTML = `<div class="empty-adm" style="padding:40px"><i class="fa-solid fa-receipt"></i><p>Nenhum pedido ${filtroPedidos === 'hoje' ? 'hoje' : 'registrado'}</p></div>`;
            return;
        }

        lista.innerHTML = pedidos.map(p => {
            let itens = [];
            try { itens = JSON.parse(p.itensJson || '[]'); } catch {}
            const isNovo = novos.some(n => n.id === p.id);
            const hora = new Date(p.criadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            const data = new Date(p.criadoEm).toLocaleDateString('pt-BR');

            const itensHtml = itens.map(item => {
                let html = `<div class="pedido-item-linha">
                    <span style="font-weight:800">${item.qtd}x</span>
                    <span>${item.emoji||''} ${item.nome}</span>
                    <span style="margin-left:auto;color:var(--am);font-weight:700">R$ ${parseFloat(item.subtotal||0).toFixed(2)}</span>
                </div>`;
                const mods = [];
                if (item.removidos?.length) mods.push(`🚫 Sem: ${item.removidos.join(', ')}`);
                if (item.adicionais?.length) item.adicionais.forEach(a => mods.push(`➕ +${a.qtd}x ${a.nome}`));
                if (item.obs) mods.push(`💬 ${item.obs}`);
                if (mods.length) html += `<div class="pedido-item-mods">${mods.join('<br>')}</div>`;
                return html;
            }).join('');

            return `
            <div class="pedido-card ${isNovo?'pedido-novo':''}">
                <div class="pedido-top">
                    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                        <span class="pedido-id">#${p.id}</span>
                        <span class="pedido-hora">${data} às ${hora}</span>
                        ${p.nomeCliente ? `<span style="font-size:.85rem;font-weight:800;color:var(--text)">${p.nomeCliente}</span>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span class="pedido-valor">R$ ${parseFloat(p.total).toFixed(2)}</span>
                        <button class="status-badge status-${p.status}"
                            onclick="avancarStatus(${p.id},'${p.status}')" title="Clique para avançar">
                            ${STATUS_LABEL[p.status]||p.status}
                        </button>
                        <button class="btn-del-pedido" onclick="excluirPedido(${p.id})">
                            <i class="fa-solid fa-trash fa-xs"></i>
                        </button>
                    </div>
                </div>
                <div class="pedido-itens">${itensHtml}</div>
                ${p.observacao ? `<div class="pedido-obs">💬 ${p.observacao}</div>` : ''}
            </div>`;
        }).join('');
    }

    /* ===================== FEEDBACK ===================== */
    function feedback(msg, ok=true) {
        const el  = document.getElementById('feedback');
        const ico = el.querySelector('i');
        document.getElementById('feedbackMsg').textContent = msg;
        el.className = `feedback ${ok?'ok':'err'} show`;
        ico.className = ok ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    window.onload = carregarDados;
</script>
