<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - ND Lanches</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --g1: #0b3d18; 
            --g2: #145a28; 
            --g3: #1b7a36; 
            --am: #f5c518; 
            --bg: #f2f7f3; 
            --danger: #dc3545;
        }
        body { font-family: 'Nunito', sans-serif; padding: 20px; background: var(--bg); color: #333; }
        h1 { font-family: 'Bebas Neue', cursive; color: var(--g1); font-size: 3rem; text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 600px; margin-left: auto; margin-right: auto; }
        h3 { border-bottom: 2px solid var(--am); padding-bottom: 8px; margin-bottom: 15px; color: var(--g2); }
        input { padding: 12px; margin: 8px 0; display: block; width: 100%; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { padding: 12px; background: var(--g1); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 1rem; }
        button:hover { background: var(--g3); transform: scale(1.01); }
        .btn-status { font-size: 1.2rem; text-transform: uppercase; }
        .aberto { background: #28a745; }
        .fechado { background: var(--danger); }
        .prod-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .prod-info { display: flex; flex-direction: column; }
        .btn-delete { width: auto; padding: 6px 12px; background: var(--danger); font-size: 0.9rem; margin-left: 5px;}
        .btn-edit { width: auto; padding: 6px 12px; background: var(--am); color: #000; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>🍔 Painel Admin ND Lanches</h1>

    <div class="card">
        <h3>Segurança</h3>
        <input type="password" id="adminKey" placeholder="Chave Secreta do Admin" value="arthur123">
    </div>

    <div class="card">
        <h3>Status da Loja</h3>
        <button id="btnStatus" onclick="alternarStatus()" class="btn-status">Carregando...</button>
    </div>

    <div class="card">
        <h3 id="formTitle">Cadastrar Novo Lanche</h3>
        <input type="text" id="nome" placeholder="Ex: X-Salada Especial">
        <input type="text" id="descricao" placeholder="Ingredientes: Pão, Carne, Queijo...">
        <input type="number" id="preco" step="0.01" placeholder="Preço (ex: 25.50)">
        <input type="text" id="imagem" placeholder="Link da Imagem (URL)">
        <button id="btnSalvar" onclick="salvarProduto()">➕ Adicionar ao Cardápio</button>
        <button id="btnCancelar" onclick="cancelarEdicao()" style="display:none; margin-top:10px; background:#666;">Cancelar Edição</button>
    </div>

    <div class="card">
        <h3>Produtos Atuais</h3>
        <div id="lista-produtos-admin">Carregando produtos...</div>
    </div>

    <script>
        const API_URL = "https://nd-lanches-api.onrender.com/api"; 
        const LOJA_SLUG = "nd-lanches";
        const LOJA_ID_NUM = 1;
        let lojaAberta = false;
        let idEdicao = null;

        async function carregarDados() {
            try {
                const resStatus = await fetch(`${API_URL}/loja/${LOJA_SLUG}/status`);
                if(resStatus.ok) {
                    lojaAberta = await resStatus.json();
                    atualizarBotaoStatus();
                }

                const resProd = await fetch(`${API_URL}/produtos/loja/${LOJA_ID_NUM}`);
                const produtos = await resProd.json();
                
                const lista = document.getElementById('lista-produtos-admin');
                if (!produtos || produtos.length === 0) {
                    lista.innerHTML = "<p>Nenhum produto cadastrado.</p>";
                    return;
                }

                lista.innerHTML = produtos.map(p => `
                    <div class="prod-item">
                        <div class="prod-info">
                            <strong>${p.nome}</strong>
                            <span>R$ ${p.preco.toFixed(2)}</span>
                        </div>
                        <div>
                            <button class="btn-edit" onclick='prepararEdicao(${JSON.stringify(p)})'>Editar</button>
                            <button class="btn-delete" onclick="excluirProduto(${p.id})">Remover</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                console.error("Erro ao carregar:", e);
                document.getElementById('lista-produtos-admin').innerText = "Erro ao conectar com o servidor.";
            }
        }

        function prepararEdicao(p) {
            idEdicao = p.id;
            document.getElementById('nome').value = p.nome;
            document.getElementById('descricao').value = p.descricao;
            document.getElementById('preco').value = p.preco;
            document.getElementById('imagem').value = p.imagemUrl;
            
            document.getElementById('formTitle').innerText = "📝 Editando: " + p.nome;
            document.getElementById('btnSalvar').innerText = "💾 Salvar Alterações";
            document.getElementById('btnCancelar').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelarEdicao() {
            idEdicao = null;
            document.getElementById('nome').value = "";
            document.getElementById('descricao').value = "";
            document.getElementById('preco').value = "";
            document.getElementById('imagem').value = "";
            document.getElementById('formTitle').innerText = "Cadastrar Novo Lanche";
            document.getElementById('btnSalvar').innerText = "➕ Adicionar ao Cardápio";
            document.getElementById('btnCancelar').style.display = "none";
        }

        function atualizarBotaoStatus() {
            const btn = document.getElementById('btnStatus');
            btn.innerText = lojaAberta ? "LOJA ESTÁ: ABERTA" : "LOJA ESTÁ: FECHADA";
            btn.className = `btn-status ${lojaAberta ? 'aberto' : 'fechado'}`;
        }

        async function alternarStatus() {
            const novaOpcao = !lojaAberta;
            const key = document.getElementById('adminKey').value;
            try {
                const res = await fetch(`${API_URL}/produtos/status`, {
                    method: 'PUT',
                    headers: { 'Admin-Key': key, 'Content-Type': 'application/json' },
                    body: JSON.stringify(novaOpcao)
                });
                if (res.ok) {
                    lojaAberta = novaOpcao;
                    atualizarBotaoStatus();
                } else { alert("Erro na chave admin!"); }
            } catch (e) { alert("Erro de conexão."); }
        }

        async function salvarProduto() {
            const key = document.getElementById('adminKey').value;
            const produto = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco: parseFloat(document.getElementById('preco').value),
                imagemUrl: document.getElementById('imagem').value,
                disponivel: true,
                loja: { id: LOJA_ID_NUM }
            };

            const url = idEdicao ? `${API_URL}/produtos/${idEdicao}` : `${API_URL}/produtos`;
            const metodo = idEdicao ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json', 'Admin-Key': key },
                    body: JSON.stringify(produto)
                });

                if (res.ok) { 
                    alert(idEdicao ? "Atualizado!" : "Cadastrado!");
                    cancelarEdicao();
                    carregarDados(); 
                } else { alert("Erro ao salvar! Verifique a chave."); }
            } catch (e) { alert("Erro de conexão."); }
        }

        async function excluirProduto(id) {
            if (!confirm("Remover este item?")) return;
            const key = document.getElementById('adminKey').value;
            try {
                const res = await fetch(`${API_URL}/produtos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Admin-Key': key }
                });
                if (res.ok) { carregarDados(); }
            } catch (e) { alert("Erro de conexão."); }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
