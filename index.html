<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ND Lanches | Cardápio Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <style>
        /* ========== RESET E VARIÁVEIS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --green: #2D6A4F;
            --green-dark: #1B4332;
            --green-mid: #40916C;
            --green-light: #D8F3DC;
            --green-pale: #F0FAF4;
            --gold: #FFB703;
            --gold-dark: #E09A00;
            --gold-light: #FFF3CD;
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --surface-2: #F8FAF8;
            --text: #212529;
            --text-mid: #495057;
            --text-muted: #6C757D;
            --border: #E9ECEF;
            --border-strong: #DEE2E6;
            --red: #E63946;
            --red-light: #FFECEE;
            --whatsapp: #25D366;
            --whatsapp-dark: #128C7E;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.1);
            --r-xs: 8px;
            --r-sm: 12px;
            --r-md: 16px;
            --r-lg: 24px;
            --r-xl: 32px;
            --r-pill: 999px;
            --transition: all 0.2s ease;
            --transition-bounce: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* ========== LAYOUT PRINCIPAL ========== */
        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 20px 80px;
        }

        .two-columns {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            flex-direction: column;
        }

        .menu-column {
            width: 100%;
        }

        .cart-column {
            width: 100%;
            position: static;
        }

        @media (min-width: 1024px) {
            .two-columns {
                flex-direction: row;
            }
            .menu-column {
                flex: 2;
            }
            .cart-column {
                flex: 1;
                position: sticky;
                top: 20px;
                max-width: 380px;
                display: block !important;
            }
            .fab-cart {
                display: none;
            }
        }

        @media (max-width: 1023px) {
            .cart-column {
                display: none;
            }
            .fab-cart {
                display: flex;
            }
        }

        /* ========== HEADER ========== */
        header {
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            border-radius: var(--r-xl);
            padding: 24px 28px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .header-logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            backdrop-filter: blur(4px);
        }

        .header-title-block h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
        }

        .tagline {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: var(--r-pill);
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
        }

        .status-pill.open {
            color: #A7F3D0;
        }

        .status-pill.closed {
            color: #FECACA;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ========== BANNERS ========== */
        .banners-section {
            margin-bottom: 28px;
            overflow-x: auto;
            scrollbar-width: thin;
            white-space: nowrap;
            display: flex;
            gap: 16px;
            padding-bottom: 8px;
        }

        .banner-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border-radius: var(--r-lg);
            padding: 12px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            white-space: normal;
            min-width: 240px;
        }

        .banner-emoji {
            font-size: 2rem;
        }

        .banner-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .banner-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ========== TABS ========== */
        .tabs-wrapper {
            margin-bottom: 24px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-pill);
            padding: 10px 22px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-mid);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-pale);
        }

        .tab-btn.active {
            background: var(--green);
            border-color: var(--green);
            color: white;
            box-shadow: 0 4px 10px rgba(45,106,79,0.2);
        }

        /* ========== PRODUTOS ========== */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 640px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        .product-card {
            background: var(--surface);
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover:not(.indisponivel) {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--green-mid);
        }

        .product-img {
            position: relative;
            height: 170px;
            background: var(--green-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-img img {
            transform: scale(1.05);
        }

        .product-img .emoji-placeholder {
            font-size: 3.5rem;
        }

        .product-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--gold);
            color: var(--green-dark);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: var(--r-pill);
            box-shadow: var(--shadow-sm);
        }

        .product-fav {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            color: #ccc;
        }

        .product-card:hover .product-fav {
            opacity: 1;
        }

        .product-fav.active {
            color: var(--red);
        }

        .indisponivel-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: var(--r-pill);
            backdrop-filter: blur(4px);
        }

        .product-card.indisponivel {
            opacity: 0.8;
            background: #f8f9fa;
            cursor: default;
        }

        .product-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }

        .product-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--green-dark);
        }

        .add-btn {
            background: var(--green);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: var(--transition-bounce);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .add-btn:hover:not(:disabled) {
            background: var(--green-dark);
            transform: scale(1.08);
        }

        .add-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
        }

        /* ========== CARRINHO (DESKTOP) ========== */
        .cart-panel {
            background: var(--surface);
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .cart-header {
            background: var(--green);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .cart-header-title {
            font-weight: 700;
            font-size: 1rem;
            flex: 1;
        }

        .cart-badge {
            background: var(--gold);
            color: var(--green-dark);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: var(--r-pill);
            font-size: 0.8rem;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            background: var(--green-pale);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .cart-item-mods {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .cart-item-price {
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .cart-item-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .cart-qty-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-pill);
            padding: 4px;
        }

        .cart-qty-btn {
            background: none;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
        }

        .cart-qty-btn:hover {
            background: var(--green);
            color: white;
        }

        .cart-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .cart-summary {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .btn-checkout {
            background: var(--whatsapp);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: var(--r-pill);
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 12px;
            transition: var(--transition);
        }

        .btn-checkout:hover {
            background: var(--whatsapp-dark);
            transform: translateY(-2px);
        }

        /* ========== FAB CART (MOBILE) ========== */
        .fab-cart {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--whatsapp);
            border-radius: 60px;
            padding: 12px 20px;
            gap: 12px;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            color: white;
            font-weight: 700;
        }

        /* ========== MODAL PRODUTO ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--r-xl);
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.25s;
        }

        .modal-overlay.open .modal {
            transform: scale(1);
        }

        .modal-product-hero {
            height: 180px;
            background: var(--green-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .modal-product-hero img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-product-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .modal-section-label {
            font-weight: 700;
            font-size: 0.8rem;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-dark);
        }

        .ingredients-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ingredient-chip {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-pill);
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .ingredient-chip.removed {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
            text-decoration: line-through;
        }

        .extras-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .extra-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .extra-card.selected {
            border-color: var(--gold);
            background: var(--gold-light);
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-pill);
            width: fit-content;
            padding: 4px;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            font-weight: 700;
            cursor: pointer;
        }

        .obs-textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 12px;
            resize: vertical;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add-cart {
            background: var(--green);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: var(--r-pill);
            font-weight: 700;
            cursor: pointer;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--green-dark);
            color: white;
            padding: 12px 24px;
            border-radius: var(--r-pill);
            font-size: 0.85rem;
            transition: transform 0.3s;
            z-index: 2000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="header-inner">
            <div class="header-logo-wrap">
                <div class="header-logo-icon">🍔</div>
                <div class="header-title-block">
                    <h1>ND Lanches</h1>
                    <div class="tagline">Sabor que conquista, entrega que encanta</div>
                </div>
            </div>
            <div id="statusIndicator" class="status-pill open">
                <span class="status-dot"></span>
                <span id="statusText">Verificando...</span>
            </div>
        </div>
    </header>

    <!-- BANNERS -->
    <div id="bannersContainer" class="banners-section"></div>

    <div class="two-columns">
        <div class="menu-column">
            <div class="tabs-wrapper">
                <div class="tabs" id="tabsContainer">
                    <button class="tab-btn active" data-cat="TODOS">🏠 Todos</button>
                    <button class="tab-btn" data-cat="LANCHE">🍔 Lanches</button>
                    <button class="tab-btn" data-cat="BEBIDA">🥤 Bebidas</button>
                    <button class="tab-btn" data-cat="PASTEL">🥟 Pastéis</button>
                    <button class="tab-btn" data-cat="BATATA">🍟 Batatas</button>
                    <button class="tab-btn" data-cat="PIZZA">🍕 Pizzas</button>
                    <button class="tab-btn" data-cat="CACHORRO QUENTE">🌭 Cachorro Quente</button>
                </div>
            </div>
            <div id="productsContainer"></div>
        </div>
        <div class="cart-column">
            <div class="cart-panel">
                <div class="cart-header">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-header-title">Seu Pedido</span>
                    <span id="cartItemCount" class="cart-badge">0</span>
                </div>
                <div id="cartItemsList" class="cart-items">
                    <div class="cart-empty">Seu carrinho está vazio</div>
                </div>
                <div id="cartSummary" class="cart-summary" style="display:none">
                    <div class="cart-total-row">
                        <span>Total</span>
                        <span id="cartTotalAmount">R$ 0,00</span>
                    </div>
                    <button id="checkoutBtn" class="btn-checkout">Fechar Pedido <i class="fa-brands fa-whatsapp"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="fabCart" class="fab-cart">
    <i class="fa-solid fa-bag-shopping"></i>
    <span id="fabCartTotal">R$ 0,00</span>
    <span id="fabCartCount" class="fab-badge">0</span>
</div>

<!-- MODAL PRODUTO -->
<div id="productModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-product-hero" id="modalHero">
            <div class="emoji-placeholder" id="modalHeroEmoji">🍔</div>
            <button class="modal-close" onclick="closeModal()"><i class="fa fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="modal-product-name" id="modalProductName"></div>
            <div class="modal-product-desc" id="modalProductDesc"></div>
            <div id="modalProductBody"></div>
        </div>
        <div class="modal-footer">
            <div><strong>Subtotal:</strong> <span id="modalTotalPrice">R$ 0,00</span></div>
            <button id="modalAddToCartBtn" class="btn-add-cart">Adicionar</button>
        </div>
    </div>
</div>

<!-- MODAL CHECKOUT (simplificado para foco) -->
<div id="checkoutModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-body">
            <h3>Finalizar Pedido</h3>
            <input type="text" id="customerName" placeholder="Seu nome" class="form-input">
            <input type="tel" id="customerPhone" placeholder="Telefone (opcional)" class="form-input">
            <div class="delivery-options">
                <label><input type="radio" name="delivery" value="RETIRADA" checked> Retirada</label>
                <label><input type="radio" name="delivery" value="ENTREGA"> Delivery</label>
            </div>
            <div id="addressFields" style="display:none">
                <input type="text" id="addressStreet" placeholder="Rua, número">
                <input type="text" id="addressNeighborhood" placeholder="Bairro">
            </div>
            <div class="payment-options">
                <label><input type="radio" name="payment" value="PIX" checked> PIX</label>
                <label><input type="radio" name="payment" value="CARTAO"> Cartão</label>
                <label><input type="radio" name="payment" value="DINHEIRO"> Dinheiro</label>
            </div>
            <button id="confirmOrderBtn" class="btn-whatsapp">Enviar WhatsApp</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
    // ==================== CONFIG ====================
    const API_URL = "https://nell-punchiest-proddingly.ngrok-free.dev/api";
    const LOJA_SLUG = "nd-lanches";
    const LOJA_ID = 1;
    const CART_KEY = "ndlanches_cart_v3";
    const LAST_ORDER_KEY = "ndlanches_last_order_v3";
    const USER_DATA_KEY = "ndlanches_user_v3";
    const DELIVERY_FEE = 5.00;

    let products = [];
    let extras = [];
    let banners = [];
    let cart = [];
    let storeOpen = true;
    let storeInfo = {};
    let currentProduct = null;
    let selectedExtras = {};
    let selectedRemovals = [];
    let productQty = 1;
    let deliveryType = "RETIRADA";
    let paymentMethod = "PIX";

    // DOM elements
    const productsContainer = document.getElementById('productsContainer');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartSummary = document.getElementById('cartSummary');
    const cartTotalAmt = document.getElementById('cartTotalAmount');
    const cartItemCount = document.getElementById('cartItemCount');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const fabCart = document.getElementById('fabCart');
    const fabCartTotal = document.getElementById('fabCartTotal');
    const fabCartCount = document.getElementById('fabCartCount');
    const productModal = document.getElementById('productModal');
    const checkoutModal = document.getElementById('checkoutModal');
    const toastEl = document.getElementById('toastMsg');
    const bannersContainer = document.getElementById('bannersContainer');

    // helpers
    function fmt(n) { return `R$ ${n.toFixed(2).replace('.', ',')}`; }
    function showToast(msg, isError = false) {
        toastEl.textContent = msg;
        toastEl.className = 'toast ' + (isError ? 'error' : '');
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 3000);
    }
    async function apiFetch(path, opts = {}) {
        return fetch(API_URL + path, {
            ...opts,
            headers: { 'ngrok-skip-browser-warning': 'any', 'Content-Type': 'application/json' }
        });
    }

    // ========== BANNERS ==========
    async function fetchBanners() {
        try {
            const res = await apiFetch(`/banners/loja/${LOJA_ID}`);
            if (res.ok) {
                const data = await res.json();
                banners = data.filter(b => b.ativo === true);
                renderBanners();
            }
        } catch(e) { console.warn("Erro ao carregar banners", e); }
    }

    function renderBanners() {
        if (!bannersContainer) return;
        if (!banners.length) {
            bannersContainer.style.display = 'none';
            return;
        }
        bannersContainer.style.display = 'flex';
        bannersContainer.innerHTML = banners.map(b => `
            <div class="banner-card" style="border-left: 4px solid ${b.cor === 'amarelo' ? '#FFB703' : b.cor === 'verde' ? '#2D6A4F' : b.cor === 'vermelho' ? '#E63946' : '#40916C'}">
                <div class="banner-emoji">${b.emoji || '📢'}</div>
                <div class="banner-info">
                    <h4>${b.titulo}</h4>
                    <p>${b.descricao || ''}</p>
                </div>
            </div>
        `).join('');
    }

    // ========== CARRINHO ==========
    function saveCart() { localStorage.setItem(CART_KEY, JSON.stringify(cart)); updateCartUI(); }
    function loadCart() { try { cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e) { cart = []; } updateCartUI(); }
    function getCartTotal() { return cart.reduce((s, item) => s + (item.price + (item.extras?.reduce((a, e) => a + e.preco, 0) || 0)) * item.quantity, 0); }
    function getCartCount() { return cart.reduce((s, i) => s + i.quantity, 0); }

    function updateCartUI() {
        const count = getCartCount();
        const total = getCartTotal();
        cartItemCount.textContent = count;
        fabCartCount.textContent = count;
        fabCartTotal.textContent = fmt(total);
        if (cart.length === 0) {
            cartItemsList.innerHTML = '<div class="cart-empty">Seu carrinho está vazio</div>';
            cartSummary.style.display = 'none';
        } else {
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = (item.price + (item.extras?.reduce((a, e) => a + e.preco, 0) || 0)) * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-img">${item.emoji || '🍔'}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-mods">${item.extras?.map(e => `+ ${e.nome}`).join(', ') || ''} ${item.removals?.map(r => `❌ ${r}`).join(', ') || ''}</div>
                            <div class="cart-item-price">${fmt(itemTotal)}</div>
                        </div>
                        <div class="cart-item-controls">
                            <div class="cart-qty-group">
                                <button class="cart-qty-btn" onclick="updateQty(${idx},-1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="cart-qty-btn" onclick="updateQty(${idx},+1)">+</button>
                            </div>
                            <button class="cart-remove" onclick="removeItem(${idx})"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            cartItemsList.innerHTML = html;
            cartSummary.style.display = 'block';
            cartTotalAmt.textContent = fmt(total + (deliveryType === 'ENTREGA' ? DELIVERY_FEE : 0));
        }
    }

    window.updateQty = (idx, delta) => {
        const newQ = cart[idx].quantity + delta;
        if (newQ < 1) return removeItem(idx);
        cart[idx].quantity = newQ;
        saveCart();
    };
    window.removeItem = (idx) => { cart.splice(idx, 1); saveCart(); showToast('Item removido'); };

    // ========== PRODUTOS ==========
    async function fetchProducts() {
        try {
            const res = await apiFetch(`/produtos/loja/${LOJA_ID}/cardapio`);
            if (res.ok) products = await res.json();
            const resExtras = await apiFetch(`/adicionais/loja/${LOJA_ID}`);
            if (resExtras.ok) extras = await resExtras.json();
        } catch(e) { console.warn(e); }
        renderProducts(products);
    }

    function renderProducts(list, filter = 'TODOS') {
        const filtered = filter === 'TODOS' ? list : list.filter(p => p.categoria === filter);
        if (!filtered.length) {
            productsContainer.innerHTML = '<div class="empty-message">Nenhum produto encontrado</div>';
            return;
        }
        const grouped = {};
        filtered.forEach(p => { (grouped[p.categoria] = grouped[p.categoria] || []).push(p); });
        const CAT_META = {
            LANCHE: { emoji: '🍔', label: 'Lanches' },
            BEBIDA: { emoji: '🥤', label: 'Bebidas' },
            PASTEL: { emoji: '🥟', label: 'Pastéis' },
            BATATA: { emoji: '🍟', label: 'Batatas' },
            PIZZA: { emoji: '🍕', label: 'Pizzas' },
            "CACHORRO QUENTE": { emoji: '🌭', label: 'Cachorro Quente' }
        };
        let html = '';
        for (const [cat, items] of Object.entries(grouped)) {
            const meta = CAT_META[cat] || { emoji: '🍽️', label: cat };
            html += `<div class="section-header"><span class="section-icon">${meta.emoji}</span><h2 class="section-title">${meta.label}</h2><span class="section-count">${items.length}</span></div><div class="products-grid">`;
            items.forEach(p => {
                const isDisponivel = p.ativo === true;
                html += `
                    <div class="product-card ${!isDisponivel ? 'indisponivel' : ''}" data-id="${p.id}">
                        <div class="product-img">
                            ${p.imagemUrl ? `<img src="${p.imagemUrl}" alt="${p.nome}">` : `<div class="emoji-placeholder">${p.emoji || meta.emoji}</div>`}
                            ${!isDisponivel ? '<div class="indisponivel-label">INDISPONÍVEL</div>' : ''}
                            <button class="product-fav" onclick="toggleFav(event,${p.id})"><i class="fa-regular fa-heart"></i></button>
                        </div>
                        <div class="product-info">
                            <div class="product-title">${p.nome}</div>
                            <div class="product-desc">${p.descricao || ''}</div>
                            <div class="product-footer">
                                <span class="product-price">${fmt(p.preco)}</span>
                                <button class="add-btn" ${!isDisponivel ? 'disabled' : ''} onclick="openProductModal(${p.id})"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        productsContainer.innerHTML = html;
    }

    window.toggleFav = (e, id) => { e.stopPropagation(); const btn = e.currentTarget; btn.classList.toggle('active'); };

    window.openProductModal = (id) => {
        if (!storeOpen) { showToast('Loja fechada no momento', true); return; }
        const p = products.find(x => x.id === id);
        if (!p || p.ativo === false) { showToast('Produto indisponível', true); return; }
        currentProduct = p;
        selectedExtras = {};
        selectedRemovals = [];
        productQty = 1;

        const hero = document.getElementById('modalHero');
        const emojiEl = document.getElementById('modalHeroEmoji');
        if (p.imagemUrl) {
            emojiEl.style.display = 'none';
            hero.querySelector('img')?.remove();
            const img = document.createElement('img'); img.src = p.imagemUrl; img.alt = p.nome;
            hero.insertBefore(img, hero.querySelector('.modal-close'));
        } else {
            emojiEl.style.display = 'flex'; emojiEl.textContent = p.emoji || '🍔';
            hero.querySelector('img')?.remove();
        }
        document.getElementById('modalProductName').textContent = p.nome;
        document.getElementById('modalProductDesc').textContent = p.descricao || '';

        let bodyHtml = '';
        // Ingredientes removíveis
        if (p.removiveis && p.removiveis.length) {
            bodyHtml += `<div class="modal-section-label">Ingredientes removíveis</div><div class="ingredients-chips">${p.removiveis.map(ing => `<div class="ingredient-chip" data-ing="${ing}">${ing}</div>`).join('')}</div>`;
        }
        // Adicionais APENAS para LANCHES
        if (p.categoria === 'LANCHE' && extras.length) {
            bodyHtml += `<div class="modal-section-label">Adicionais</div><div class="extras-grid">${extras.map(ext => `<div class="extra-card" data-id="${ext.id}"><span>${ext.emoji || '➕'}</span><div><strong>${ext.nome}</strong><br>+ ${fmt(ext.preco)}</div></div>`).join('')}</div>`;
        }
        bodyHtml += `
            <div class="modal-section-label">Quantidade</div>
            <div class="qty-control"><button class="qty-btn" id="qtyDec">-</button><span id="qtyVal">1</span><button class="qty-btn" id="qtyInc">+</button></div>
            <div class="modal-section-label">Observações</div>
            <textarea id="productObservation" rows="2" placeholder="Ex: sem cebola, ponto da carne..."></textarea>
        `;
        document.getElementById('modalProductBody').innerHTML = bodyHtml;

        document.querySelectorAll('.ingredient-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const ing = chip.dataset.ing;
                if (selectedRemovals.includes(ing)) {
                    selectedRemovals = selectedRemovals.filter(i => i !== ing);
                    chip.classList.remove('removed');
                } else {
                    selectedRemovals.push(ing);
                    chip.classList.add('removed');
                }
            });
        });
        document.querySelectorAll('.extra-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = +card.dataset.id;
                const extra = extras.find(e => e.id === id);
                if (selectedExtras[id]) {
                    delete selectedExtras[id];
                    card.classList.remove('selected');
                } else {
                    selectedExtras[id] = extra;
                    card.classList.add('selected');
                }
                updateModalTotal();
            });
        });
        document.getElementById('qtyDec').onclick = () => { if (productQty > 1) { productQty--; document.getElementById('qtyVal').textContent = productQty; updateModalTotal(); } };
        document.getElementById('qtyInc').onclick = () => { productQty++; document.getElementById('qtyVal').textContent = productQty; updateModalTotal(); };
        updateModalTotal();
        productModal.classList.add('open');
    };

    function updateModalTotal() {
        if (!currentProduct) return;
        const extrasSum = Object.values(selectedExtras).reduce((s, e) => s + e.preco, 0);
        const total = (currentProduct.preco + extrasSum) * productQty;
        document.getElementById('modalTotalPrice').textContent = fmt(total);
    }

    function closeModal() { productModal.classList.remove('open'); }
    document.getElementById('modalAddToCartBtn').onclick = () => {
        if (!currentProduct) return;
        const extraList = Object.values(selectedExtras);
        const obs = document.getElementById('productObservation').value;
        cart.push({
            id: currentProduct.id,
            name: currentProduct.nome,
            price: currentProduct.preco,
            quantity: productQty,
            extras: extraList,
            removals: selectedRemovals,
            observation: obs,
            emoji: currentProduct.emoji
        });
        saveCart();
        closeModal();
        showToast(`✅ ${productQty}x ${currentProduct.nome} adicionado!`);
    };

    // ========== CHECKOUT ==========
    function openCheckout() {
        if (!storeOpen) { showToast('Loja fechada', true); return; }
        if (!cart.length) { showToast('Carrinho vazio', true); return; }
        // preencher dados salvos
        const user = JSON.parse(localStorage.getItem(USER_DATA_KEY) || '{}');
        document.getElementById('customerName').value = user.name || '';
        document.getElementById('customerPhone').value = user.phone || '';
        checkoutModal.classList.add('open');
    }
    function closeCheckoutModal() { checkoutModal.classList.remove('open'); }
    document.querySelectorAll('input[name="delivery"]').forEach(r => r.addEventListener('change', e => {
        deliveryType = e.target.value;
        document.getElementById('addressFields').style.display = deliveryType === 'ENTREGA' ? 'block' : 'none';
    }));
    document.querySelectorAll('input[name="payment"]').forEach(r => r.addEventListener('change', e => paymentMethod = e.target.value));
    document.getElementById('confirmOrderBtn').onclick = async () => {
        const nome = document.getElementById('customerName').value.trim();
        if (!nome) { showToast('Digite seu nome', true); return; }
        const phone = document.getElementById('customerPhone').value.trim();
        let endereco = '';
        if (deliveryType === 'ENTREGA') {
            const rua = document.getElementById('addressStreet').value.trim();
            const bairro = document.getElementById('addressNeighborhood').value.trim();
            if (!rua || !bairro) { showToast('Preencha endereço', true); return; }
            endereco = `${rua}, ${bairro}`;
        }
        const total = getCartTotal() + (deliveryType === 'ENTREGA' ? DELIVERY_FEE : 0);
        let itensMsg = cart.map(item => `${item.quantity}x ${item.name} - ${fmt((item.price + (item.extras?.reduce((a,e)=>a+e.preco,0)||0)) * item.quantity)}`).join('\n');
        const msg = `*NOVO PEDIDO*\nCliente: ${nome}\nEntrega: ${deliveryType === 'ENTREGA' ? 'Delivery' : 'Retirada'}\n${endereco}\n\n${itensMsg}\nTotal: ${fmt(total)}\nPagamento: ${paymentMethod}`;
        localStorage.setItem(USER_DATA_KEY, JSON.stringify({ name: nome, phone, street: endereco }));
        localStorage.setItem(LAST_ORDER_KEY, JSON.stringify(cart));
        const wpp = storeInfo.whatsapp || '5517999999999';
        window.open(`https://wa.me/${wpp}?text=${encodeURIComponent(msg)}`, '_blank');
        cart = [];
        saveCart();
        closeCheckoutModal();
        showToast('Pedido enviado!');
    };

    // ========== STATUS ==========
    async function fetchStoreStatus() {
        try {
            const r = await apiFetch(`/loja/${LOJA_SLUG}/status`);
            if (r.ok) storeOpen = await r.json();
            const sr = await apiFetch(`/loja/${LOJA_SLUG}`);
            if (sr.ok) storeInfo = await sr.json();
        } catch(e) {}
        const ind = document.getElementById('statusIndicator');
        const txt = document.getElementById('statusText');
        if (storeOpen) {
            ind.className = 'status-pill open';
            txt.textContent = 'Aberto agora';
        } else {
            ind.className = 'status-pill closed';
            txt.textContent = 'Fechado';
        }
    }

    // ========== INIT ==========
    async function init() {
        loadCart();
        await fetchStoreStatus();
        await fetchBanners();
        await fetchProducts();
        fabCart.addEventListener('click', () => {
            if (cart.length) openCheckout();
            else showToast('Carrinho vazio', true);
        });
        checkoutBtn.onclick = openCheckout;
        productModal.addEventListener('click', e => { if (e.target === productModal) closeModal(); });
        checkoutModal.addEventListener('click', e => { if (e.target === checkoutModal) closeCheckoutModal(); });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProducts(products, btn.dataset.cat);
            });
        });
    }
    init();
</script>
</body>
</html>
